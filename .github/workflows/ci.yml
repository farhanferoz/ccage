name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [bash, zsh]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install shellcheck
        if: matrix.os == 'ubuntu-latest' && matrix.shell == 'bash'
        run: command -v shellcheck || sudo apt-get install -y shellcheck
        shell: bash

      - name: Install zsh (ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.shell == 'zsh'
        run: command -v zsh || sudo apt-get install -y zsh
        shell: bash

      - name: shellcheck
        if: matrix.os == 'ubuntu-latest' && matrix.shell == 'bash'
        run: shellcheck bin/ccage share/*.sh share/hooks/*.sh share/skills/checkpoint/*.sh share/skills/keepwarm/*.sh install.sh uninstall.sh
        shell: bash

      # `shell: bash` resolves via PATH, so a green macOS leg does not by itself
      # prove bash 3.2 compatibility — the runner may put a newer Homebrew bash
      # first. ccage targets stock macOS bash 3.2, so make the version that
      # actually ran visible in the log rather than assuming it.
      - name: report bash version
        if: matrix.shell == 'bash'
        run: |
          command -v bash
          bash --version | head -1
          printf 'stock /bin/bash: '; /bin/bash --version | head -1
        shell: bash

      - name: source smoke test (bash)
        if: matrix.shell == 'bash'
        run: |
          source share/claude-isolation.sh
          typeset -f claude >/dev/null
        shell: bash

      - name: source smoke test (zsh)
        if: matrix.shell == 'zsh'
        run: |
          source share/claude-isolation.sh
          typeset -f claude >/dev/null
        shell: 'zsh -e {0}'

      - name: bats tests
        if: matrix.shell == 'bash'
        run: ./tests/bats/bin/bats tests/
        shell: bash
